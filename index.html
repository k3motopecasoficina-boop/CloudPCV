<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudPCV - Máquinas Virtuais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #0a0a0f;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 420px;
            width: 100%;
            background: #1a1a2e;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .badge {
            background: #4facfe;
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: #0a0a0f;
            padding: 14px 8px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card .number {
            font-size: 24px;
            font-weight: bold;
            color: #4facfe;
        }
        .card .label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .empty {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
        .empty .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }
        .empty p {
            font-size: 14px;
        }
        .empty .sub {
            font-size: 12px;
            color: #444;
            margin-top: 8px;
        }
        .btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .vm-card {
            background: #0a0a0f;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #4facfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vm-card .info {
            flex: 1;
        }
        .vm-card .name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .vm-card .details {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        .vm-card .status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .vm-card .status.on {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        .vm-card .status.off {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }
        .vm-card .delete-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .modal-content .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-content .modal-header h2 {
            color: #4facfe;
            font-size: 20px;
        }
        .modal-content .modal-header .close {
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-content label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .modal-content select,
        .modal-content input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0a0a0f;
            color: #fff;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
        }
        .modal-content select:focus,
        .modal-content input:focus {
            border-color: #4facfe;
        }
        .range-group {
            margin-bottom: 16px;
        }
        .range-group .range-header {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 13px;
        }
        .range-group .range-header .value {
            color: #4facfe;
            font-weight: bold;
        }
        .range-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #333;
            outline: none;
            margin-top: 8px;
        }
        .range-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            cursor: pointer;
        }
        .modal-content .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-content .btn-primary:active {
            transform: scale(0.97);
        }
        .modal-content .btn-secondary {
            background: #333;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            display: none;
        }
        .toast.show {
            display: block;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- HEADER -->
    <div class="header">
        <h1>☁️ CloudPCV</h1>
        <span class="badge">🚀 REAL</span>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <div class="number" id="totalVMs">0</div>
            <div class="label">Total</div>
        </div>
        <div class="card">
            <div class="number" id="activeVMs">0</div>
            <div class="label">Ativas</div>
        </div>
        <div class="card">
            <div class="number" id="maxVMs">15</div>
            <div class="label">Limite</div>
        </div>
    </div>

    <!-- LISTA DE VMs -->
    <div id="vmList"></div>

    <!-- BOTÃO CRIAR -->
    <button class="btn" onclick="openModal()">➕ Criar VM</button>
</div>

<!-- MODAL CRIAR VM -->
<div class="modal" id="createModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📦 Criar VM</h2>
            <button class="close" onclick="closeModal()">✕</button>
        </div>

        <label>🖥️ Sistema Operacional</label>
        <select id="osSelect">
            <option value="windows10">🪟 Windows 10</option>
            <option value="windows11">🪟 Windows 11</option>
            <option value="linux">🐧 Linux</option>
            <option value="ubuntu">🟣 Ubuntu</option>
        </select>

        <div class="range-group">
            <div class="range-header">
                <span>💾 Armazenamento</span>
                <span class="value" id="storageLabel">50 GB</span>
            </div>
            <input type="range" id="storageRange" min="20" max="200" value="50" oninput="updateStorage(this.value)">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:4px;">
                <span>20 GB</span>
                <span>200 GB</span>
            </div>
        </div>

        <div class="range-group">
            <div class="range-header">
                <span>🧠 Memória RAM</span>
                <span class="value" id="ramLabel">4 GB</span>
            </div>
            <input type="range" id="ramRange" min="2" max="16" value="4" oninput="updateRAM(this.value)">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:4px;">
                <span>2 GB</span>
                <span>16 GB</span>
            </div>
        </div>

        <button class="btn-primary" onclick="createVM()">🚀 Criar VM</button>
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DADOS
// ============================================================
let vms = JSON.parse(localStorage.getItem('cloudpcv_vms')) || [];

// ============================================================
// FUNÇÕES
// ============================================================

function saveVMs() {
    localStorage.setItem('cloudpcv_vms', JSON.stringify(vms));
    renderVMs();
}

function renderVMs() {
    const list = document.getElementById('vmList');
    const total = document.getElementById('totalVMs');
    const active = document.getElementById('activeVMs');

    total.textContent = vms.length;
    const activeCount = vms.filter(v => v.status === 'on').length;
    active.textContent = activeCount;

    if (vms.length === 0) {
        list.innerHTML = `
            <div class="empty">
                <span class="icon">☁️</span>
                <p>Nenhuma VM criada</p>
                <p class="sub">Clique em "Criar VM" para começar</p>
            </div>
        `;
        return;
    }

    list.innerHTML = vms.map((vm, index) => `
        <div class="vm-card">
            <div class="info" onclick="enterVM(${index})">
                <div class="name">${vm.icon} ${vm.name}</div>
                <div class="details">💾 ${vm.storage}GB · 🧠 ${vm.ram}GB</div>
                <span class="status ${vm.status === 'on' ? 'on' : 'off'}">${vm.status === 'on' ? '🟢 Rodando' : '🔴 Desligada'}</span>
            </div>
            <button class="delete-btn" onclick="deleteVM(${index})">✕</button>
        </div>
    `).join('');
}

function openModal() {
    document.getElementById('createModal').classList.add('open');
}

function closeModal() {
    document.getElementById('createModal').classList.remove('open');
}

function updateStorage(val) {
    document.getElementById('storageLabel').textContent = val + ' GB';
}

function updateRAM(val) {
    document.getElementById('ramLabel').textContent = val + ' GB';
}

function createVM() {
    const os = document.getElementById('osSelect').value;
    const storage = parseInt(document.getElementById('storageRange').value);
    const ram = parseInt(document.getElementById('ramRange').value);

    const osNames = {
        windows10: { name: 'Windows 10', icon: '🪟' },
        windows11: { name: 'Windows 11', icon: '🪟' },
        linux: { name: 'Linux', icon: '🐧' },
        ubuntu: { name: 'Ubuntu', icon: '🟣' }
    };

    if (vms.length >= 15) {
        vms.shift();
        showToast('⚠️ Limite de 15 VMs. A mais antiga foi removida.');
    }

    vms.push({
        id: Date.now(),
        name: osNames[os].name,
        icon: osNames[os].icon,
        storage: storage,
        ram: ram,
        status: 'off'
    });

    saveVMs();
    closeModal();
    showToast('✅ VM criada com sucesso!');
}

function deleteVM(index) {
    if (confirm('🗑️ Tem certeza que quer deletar esta VM?')) {
        vms.splice(index, 1);
        saveVMs();
        showToast('🗑️ VM deletada');
    }
}

function enterVM(index) {
    const vm = vms[index];
    if (vm.status === 'off') {
        vm.status = 'on';
        saveVMs();
        showToast(`🖥️ ${vm.name} iniciada!`);
    } else {
        vm.status = 'off';
        saveVMs();
        showToast(`🔴 ${vm.name} desligada`);
    }
}

// TOAST
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// ============================================================
// INICIAR
// ============================================================
renderVMs();
console.log('☁️ CloudPCV iniciado!');
console.log('📊', vms.length, 'VMs');
</script>
</body>
  </html>
